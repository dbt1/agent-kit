name: CI

on:
  push:
  pull_request:

jobs:
  shell-checks-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CI smoke script
        run: |
          bash scripts/ci-smoke.sh

  shell-checks-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CI smoke script (PowerShell)
        run: |
          powershell -NoProfile -File scripts/ci-smoke.ps1
